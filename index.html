<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tomato Farm · Ad Engine</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════
   DESIGN SYSTEM
═══════════════════════════════════════════ */
:root {
  --gold:          #f5c63e;
  --gold-dim:      rgba(245,198,62,0.18);
  --gold-border:   rgba(245,198,62,0.28);
  --ton:           #0098ea;
  --ton-dim:       rgba(0,152,234,0.16);
  --ton-border:    rgba(0,152,234,0.32);
  --green:         #5ecf88;
  --green-dim:     rgba(94,207,136,0.12);
  --green-border:  rgba(94,207,136,0.25);
  --red:           #f06060;
  --surface:       rgba(6,14,8,0.82);
  --glass:         rgba(255,255,255,0.04);
  --glass-border:  rgba(255,255,255,0.09);
  --text:          #ece7de;
  --text-dim:      rgba(236,231,222,0.45);
  --text-muted:    rgba(236,231,222,0.22);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  font-family: 'DynaPuff', fantasy;
  color: var(--text);
  overflow: hidden;
  background: url(file3.png);
}

/* ─── ANIMATED BACKGROUND ─── */
.bg-scene {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
}

.bg-gradient {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 15%, rgba(94,207,136,0.09) 0%, transparent 60%),
    radial-gradient(ellipse 55% 40% at 80% 80%, rgba(0,152,234,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(245,198,62,0.05) 0%, transparent 70%),
    linear-gradient(170deg, #040b05 0%, #020805 50%, #040a08 100%);
}

/* Floating orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  animation: orbDrift var(--dur, 18s) ease-in-out infinite alternate;
  opacity: 0;
  animation-fill-mode: forwards;
}
.orb-1 {
  width: 260px; height: 260px;
  top: -80px; left: -60px;
  background: radial-gradient(circle, rgba(94,207,136,0.18), transparent 70%);
  --dur: 22s;
  animation-delay: 0s;
}
.orb-2 {
  width: 200px; height: 200px;
  bottom: 20%; right: -40px;
  background: radial-gradient(circle, rgba(0,152,234,0.15), transparent 70%);
  --dur: 17s;
  animation-delay: -5s;
}
.orb-3 {
  width: 140px; height: 140px;
  top: 45%; left: 30%;
  background: radial-gradient(circle, rgba(245,198,62,0.12), transparent 70%);
  --dur: 25s;
  animation-delay: -10s;
}
@keyframes orbDrift {
  0%   { transform: translate(0,0) scale(1);   opacity: 0.6; }
  33%  { transform: translate(30px,-20px) scale(1.08); opacity: 0.9; }
  66%  { transform: translate(-15px,25px) scale(0.95); opacity: 0.7; }
  100% { transform: translate(20px,10px) scale(1.04); opacity: 0.85; }
}

/* Grid overlay */
.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: radial-gradient(ellipse 80% 80% at center, black 30%, transparent 100%);
}

/* Vignette */
.bg-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 100% 100% at center, transparent 40%, rgba(0,0,0,0.75) 100%);
}

/* ─── LAYOUT ─── */
.shell {
  position: relative; z-index: 1;
  height: 100%; width: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px 20px 28px;
  gap: 14px;
}

/* ─── HEADER ─── */
.header {
  width: 100%;
  display: flex; flex-direction: column; align-items: center;
  gap: 6px;
  animation: slideDown 0.7s cubic-bezier(.22,1,.36,1) both;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-28px); }
  to   { opacity: 1; transform: translateY(0); }
}

.logo-ring {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(245,198,62,0.15), rgba(94,207,136,0.1));
  border: 1.5px solid var(--gold-border);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  box-shadow:
    0 0 0 8px rgba(245,198,62,0.04),
    0 0 40px rgba(245,198,62,0.12),
    inset 0 1px 0 rgba(255,255,255,0.1);
  animation: pulseLogo 3s ease-in-out infinite;
}
@keyframes pulseLogo {
  0%,100% { box-shadow: 0 0 0 8px rgba(245,198,62,0.04), 0 0 40px rgba(245,198,62,0.12), inset 0 1px 0 rgba(255,255,255,0.1); }
  50%     { box-shadow: 0 0 0 14px rgba(245,198,62,0.06), 0 0 60px rgba(245,198,62,0.22), inset 0 1px 0 rgba(255,255,255,0.1); }
}

.logo-ring::before {
  content: '';
  position: absolute; inset: -4px;
  border-radius: 50%;
  border: 1px solid transparent;
  background: linear-gradient(135deg, rgba(245,198,62,0.4), transparent 50%, rgba(94,207,136,0.3)) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  animation: rotateBorder 8s linear infinite;
}
@keyframes rotateBorder {
  to { transform: rotate(360deg); }
}

.logo-emoji { font-size: 2rem; }

.header-title {
  font-size: 1.1rem; font-weight: 700; letter-spacing: 3px;
  background: linear-gradient(135deg, #ffe47a 0%, #f5c63e 40%, #e0900a 80%, #f5c63e 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 8px rgba(245,198,62,0.35));
  text-transform: uppercase;
}

.header-sub {
  font-size: 0.5rem; letter-spacing: 2.5px;
  color: var(--text-muted);
  text-transform: uppercase;
  font-family: 'Space Mono', monospace;
}

/* ─── STATUS GLASS CARD ─── */
.status-card {
  width: 100%;
  background:
    linear-gradient(160deg, rgba(12,26,14,0.88) 0%, rgba(6,16,8,0.94) 100%);
  border: 1px solid var(--glass-border);
  border-radius: 22px;
  padding: 16px;
  position: relative; overflow: hidden;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.06),
    inset 0 -1px 0 rgba(0,0,0,0.4);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  animation: cardReveal 0.8s cubic-bezier(.22,1,.36,1) 0.1s both;
}
@keyframes cardReveal {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* top shimmer */
.status-card::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(245,198,62,0.55), transparent);
  pointer-events: none;
}

/* ambient inner glow bottom */
.status-card::after {
  content: '';
  position: absolute; bottom: -15px; left: 15%; right: 15%; height: 30px;
  background: radial-gradient(ellipse, rgba(94,207,136,0.09) 0%, transparent 70%);
  pointer-events: none;
}

/* ─── CYCLE INDICATOR ─── */
.cycle-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}

.cycle-label {
  font-size: 0.46rem; letter-spacing: 2px;
  color: var(--text-muted); text-transform: uppercase;
  font-family: 'Space Mono', monospace;
}

.cycle-badge {
  display: flex; align-items: center; gap: 6px;
  background: var(--green-dim);
  border: 1px solid var(--green-border);
  border-radius: 20px; padding: 4px 10px;
  font-size: 0.52rem; font-weight: 700; color: var(--green);
  font-family: 'Space Mono', monospace;
}

.cycle-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: blinkDot 1.2s ease-in-out infinite;
}
@keyframes blinkDot {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.3; transform: scale(0.7); }
}
.cycle-dot.paused { background: var(--gold); animation: none; opacity: 0.5; }
.cycle-dot.error  { background: var(--red);  animation: blinkDot 0.5s ease-in-out infinite; }

/* ─── AD PROGRESS TRACK ─── */
.ad-track {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 12px 14px;
  position: relative; overflow: hidden;
  margin-bottom: 12px;
}

.ad-track-label {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}

.ad-track-name {
  font-size: 0.58rem; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px;
}

.ad-track-count {
  font-size: 0.58rem; font-weight: 700;
  font-family: 'Space Mono', monospace;
  color: var(--gold);
}

.progress-bar-wrap {
  width: 100%;
  height: 5px;
  background: rgba(255,255,255,0.07);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--green), #2db86a);
  width: 0%;
  transition: width 0.6s cubic-bezier(.22,1,.36,1);
  position: relative;
}

.progress-bar-fill::after {
  content: '';
  position: absolute; top: 0; right: 0; bottom: 0; width: 30px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45));
  animation: shimmerBar 1.4s ease-in-out infinite;
}
@keyframes shimmerBar {
  0%   { opacity: 0; transform: translateX(-20px); }
  50%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(0); }
}

/* ─── COUNTDOWN RING ─── */
.countdown-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; margin: 4px 0 12px;
}

.ring-wrap {
  position: relative;
  width: 86px; height: 86px;
}

.ring-svg {
  width: 100%; height: 100%;
  transform: rotate(-90deg);
  animation: cardReveal 0.5s ease both 0.3s;
}

.ring-bg {
  fill: none;
  stroke: rgba(255,255,255,0.06);
  stroke-width: 5;
}

.ring-fill {
  fill: none;
  stroke: url(#ringGrad);
  stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 226; /* 2π × 36 */
  stroke-dashoffset: 226;
  transition: stroke-dashoffset 1s linear;
}

.ring-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1px;
}

.ring-time {
  font-size: 1.3rem; font-weight: 700;
  font-family: 'Space Mono', monospace;
  background: linear-gradient(135deg, #f7d05a, #f5c63e, #e89a10);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

.ring-unit {
  font-size: 0.36rem; color: var(--text-muted);
  letter-spacing: 1.5px; text-transform: uppercase;
}

.countdown-label {
  font-size: 0.48rem; color: var(--text-dim);
  letter-spacing: 1.2px; text-transform: uppercase;
  font-family: 'Space Mono', monospace;
}

/* ─── STATE MESSAGE ─── */
.state-msg {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px; padding: 10px 12px;
  width: 100%;
  min-height: 42px;
}

.state-icon {
  font-size: 1rem; flex-shrink: 0;
  animation: iconPulse 2s ease-in-out infinite;
}
@keyframes iconPulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.15); }
}

.state-text {
  flex: 1; min-width: 0;
  font-size: 0.6rem; font-weight: 700; color: var(--text-dim);
  line-height: 1.4;
  text-transform: none; letter-spacing: 0.2px;
}

.state-text b { color: var(--text); }

/* loading dots animation */
.dots::after {
  content: '';
  animation: dotsCycle 1.5s steps(4, end) infinite;
}
@keyframes dotsCycle {
  0%  { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}

/* ─── STATS ROW ─── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px; width: 100%;
  animation: cardReveal 0.8s cubic-bezier(.22,1,.36,1) 0.2s both;
}

.stat-cell {
  background: rgba(8,18,10,0.70);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px; padding: 10px 8px;
  text-align: center; position: relative; overflow: hidden;
  backdrop-filter: blur(10px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}

.stat-cell::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
}

.stat-icon { font-size: 0.9rem; display: block; margin-bottom: 4px; }
.stat-val {
  font-size: 1rem; font-weight: 700; display: block; line-height: 1;
  font-family: 'Space Mono', monospace;
}
.stat-val.gold  { color: var(--gold); }
.stat-val.blue  { color: #81d4fa; }
.stat-val.green { color: var(--green); }
.stat-lbl {
  font-size: 0.38rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
  display: block; margin-top: 3px;
}

/* ─── LOG FEED ─── */
.log-feed-wrap {
  width: 100%;
  animation: cardReveal 0.8s cubic-bezier(.22,1,.36,1) 0.3s both;
}

.log-header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 8px;
}

.log-title {
  font-size: 0.44rem; letter-spacing: 2px;
  color: var(--text-muted); text-transform: uppercase;
  font-family: 'Space Mono', monospace;
  flex: 1;
}

.log-clear {
  font-size: 0.4rem; color: rgba(255,255,255,0.2);
  cursor: pointer; padding: 3px 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 6px;
  font-family: 'Space Mono', monospace;
  transition: color 0.15s, border-color 0.15s;
}
.log-clear:hover { color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.14); }

.log-feed {
  background: rgba(4,10,6,0.75);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 10px;
  max-height: 90px;
  overflow-y: auto;
  display: flex; flex-direction: column-reverse;
  gap: 4px;
  -webkit-overflow-scrolling: touch;
}
.log-feed::-webkit-scrollbar { width: 2px; }
.log-feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.log-entry {
  font-size: 0.52rem; font-family: 'Space Mono', monospace;
  color: var(--text-dim); line-height: 1.5;
  padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  display: flex; align-items: flex-start; gap: 6px;
  animation: logSlide 0.3s ease;
}
.log-entry:last-child { border-bottom: none; }
@keyframes logSlide {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.log-ts {
  color: var(--text-muted); flex-shrink: 0;
  font-size: 0.44rem;
}

.log-entry.success .log-body { color: var(--green); }
.log-entry.warn    .log-body { color: var(--gold); }
.log-entry.error   .log-body { color: var(--red); }
.log-entry.info    .log-body { color: #81d4fa; }

/* ─── PASSIVE AD LABEL ─── */
.engine-label {
  width: 100%;
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
  animation: cardReveal 0.8s cubic-bezier(.22,1,.36,1) 0.4s both;
}

.engine-badge {
  display: flex; align-items: center; gap: 6px;
  background: var(--ton-dim);
  border: 1px solid var(--ton-border);
  border-radius: 20px; padding: 5px 12px;
  font-size: 0.46rem; color: rgba(0,152,234,0.75);
  text-transform: uppercase; letter-spacing: 1.5px;
  font-family: 'Space Mono', monospace;
}

/* ─── TOAST ─── */
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: rgba(10,22,12,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 10px 18px;
  font-size: 0.62rem; color: var(--text);
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 9999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  transform: translateX(-50%) translateY(10px);
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ─── AD FLASH OVERLAY ─── */
#ad-flash {
  position: fixed; inset: 0; z-index: 9000;
  pointer-events: none;
  box-shadow: inset 0 0 80px rgba(94,207,136,0);
  transition: box-shadow 0.15s ease;
}
#ad-flash.active {
  box-shadow: inset 0 0 100px rgba(94,207,136,0.3);
}

/* ─── PARTICLES ─── */
.particle {
  position: fixed;
  pointer-events: none;
  border-radius: 50%;
  z-index: 200;
}

/* ─── RESPONSIVE ─── */
@media (max-height: 640px) {
  .shell { gap: 10px; padding: 14px 18px 20px; }
  .logo-ring { width: 52px; height: 52px; }
  .logo-emoji { font-size: 1.6rem; }
  .header-title { font-size: 0.9rem; }
  .ring-wrap { width: 72px; height: 72px; }
  .ring-time { font-size: 1.1rem; }
  .log-feed { max-height: 70px; }
}

@media (max-width: 360px) {
  .stats-row { gap: 6px; }
  .stat-val { font-size: 0.88rem; }
}

</style>
</head>
<body>

<!-- SVG Defs -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5ecf88"/>
      <stop offset="100%" stop-color="#f5c63e"/>
    </linearGradient>
  </defs>
</svg>

<!-- Background -->
<div class="bg-scene" aria-hidden="true">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="bg-vignette"></div>
</div>

<!-- Ad Flash -->
<div id="ad-flash" aria-hidden="true"></div>

<!-- Main Shell -->
<main class="shell" role="main">

  <!-- Header -->
  <header class="header" aria-label="Tomato Farm Ad Engine">
    <div class="logo-ring" aria-hidden="true">
      <span class="logo-emoji">🍅</span>
    </div>
    <h1 class="header-title">Tomato Farm</h1>
    <p class="header-sub">Passive Ad Engine · Auto-Loop</p>
  </header>

  <!-- Status Glass Card -->
  <section class="status-card" aria-label="Ad engine status">

    <!-- Cycle row -->
    <div class="cycle-header">
      <span class="cycle-label">Engine Status</span>
      <div class="cycle-badge" id="cycle-badge">
        <span class="cycle-dot" id="cycle-dot"></span>
        <span id="cycle-status-txt">Initializing</span>
      </div>
    </div>

    <!-- Progress track -->
    <div class="ad-track">
      <div class="ad-track-label">
        <span class="ad-track-name">Session Progress</span>
        <span class="ad-track-count" id="session-count">Cycle 0</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- Countdown ring -->
    <div class="countdown-wrap">
      <div class="ring-wrap" aria-label="Next ad countdown">
        <svg class="ring-svg" viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="36"/>
          <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="36"/>
        </svg>
        <div class="ring-center">
          <span class="ring-time" id="ring-time">—</span>
          <span class="ring-unit">seconds</span>
        </div>
      </div>
      <span class="countdown-label" id="ring-label">Waiting to start</span>
    </div>

    <!-- State message -->
    <div class="state-msg" role="status" aria-live="polite">
      <span class="state-icon" id="state-icon">⏳</span>
      <span class="state-text" id="state-text">
        Initializing ad engine<span class="dots"></span>
      </span>
    </div>

  </section>

  <!-- Stats -->
  <div class="stats-row" aria-label="Session stats">
    <div class="stat-cell">
      <span class="stat-icon">📺</span>
      <span class="stat-val gold" id="stat-total">0</span>
      <span class="stat-lbl">Ads Shown</span>
    </div>
    <div class="stat-cell">
      <span class="stat-icon">🔄</span>
      <span class="stat-val blue" id="stat-cycles">0</span>
      <span class="stat-lbl">Cycles</span>
    </div>
    <div class="stat-cell">
      <span class="stat-icon">⚡</span>
      <span class="stat-val green" id="stat-uptime">0s</span>
      <span class="stat-lbl">Uptime</span>
    </div>
  </div>

  <!-- Log Feed -->
  <div class="log-feed-wrap">
    <div class="log-header">
      <span class="log-title">Engine Log</span>
      <button class="log-clear" onclick="clearLog()" aria-label="Clear log">Clear</button>
    </div>
    <div class="log-feed" id="log-feed" aria-label="Ad engine activity log" aria-live="polite">
      <div class="log-entry info">
        <span class="log-ts" id="init-ts"></span>
        <span class="log-body">Engine loaded. Awaiting Adsgram SDK<span class="dots"></span></span>
      </div>
    </div>
  </div>

  <!-- Engine badge -->
  <div class="engine-label">
    <div class="engine-badge">
      <span>🔵</span>
      Powered by Adsgram · int-27915
    </div>
  </div>

</main>

<!-- Toast -->
<div id="toast" role="alert" aria-live="assertive"></div>

<script>

/* ═══════════════════════════════════════════════════════
   TOMATO FARM — PASSIVE AD ENGINE
   Runs Adsgram ad loop every 70 seconds, indefinitely.
   No button press required. Fully automatic.
   Mirrors _startPassiveAds() from the main app.
═══════════════════════════════════════════════════════ */

const ADSGRAM_BLOCK_ID  = 'int-27915';
const CYCLE_INTERVAL_MS = 6_000;   // 70 seconds — same as main app
const INIT_DELAY_MS     = 3_000;    // Give Adsgram SDK time to load

// ─── State ───
let _cycleCount   = 0;
let _totalAds     = 0;
let _startTime    = Date.now();
let _nextAdTime   = null;
let _timerHandle  = null;
let _countdownRAF = null;
let _engineLive   = false;
let _toastTimer   = null;
let _uptimeHandle = null;

const tg = window.Telegram?.WebApp || null;

// ─── DOM refs ───
const $cycleStatusTxt = document.getElementById('cycle-status-txt');
const $cycleDot       = document.getElementById('cycle-dot');
const $sessionCount   = document.getElementById('session-count');
const $progressFill   = document.getElementById('progress-fill');
const $ringFill       = document.getElementById('ring-fill');
const $ringTime       = document.getElementById('ring-time');
const $ringLabel      = document.getElementById('ring-label');
const $stateIcon      = document.getElementById('state-icon');
const $stateText      = document.getElementById('state-text');
const $statTotal      = document.getElementById('stat-total');
const $statCycles     = document.getElementById('stat-cycles');
const $statUptime     = document.getElementById('stat-uptime');
const $logFeed        = document.getElementById('log-feed');
const $adFlash        = document.getElementById('ad-flash');

// Init timestamp
document.getElementById('init-ts').textContent = _ts();

/* ─── Timestamp ─── */
function _ts() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0') + ':' +
         d.getSeconds().toString().padStart(2,'0');
}

/* ─── Log ─── */
function log(msg, type = 'info') {
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  entry.innerHTML = `<span class="log-ts">${_ts()}</span><span class="log-body">${msg}</span>`;
  $logFeed.prepend(entry);
  // Keep max 40 entries
  while ($logFeed.children.length > 40) $logFeed.removeChild($logFeed.lastChild);
}

function clearLog() {
  $logFeed.innerHTML = '';
  log('Log cleared.', 'info');
}

/* ─── Toast ─── */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

/* ─── Status badge ─── */
function setStatus(label, dotClass) {
  $cycleStatusTxt.textContent = label;
  $cycleDot.className = 'cycle-dot ' + (dotClass || '');
}

/* ─── State message ─── */
function setStateMsg(icon, html) {
  $stateIcon.textContent = icon;
  $stateText.innerHTML   = html;
}

/* ─── Edge flash ─── */
function flashEdge() {
  $adFlash.classList.add('active');
  setTimeout(() => $adFlash.classList.remove('active'), 500);
}

/* ─── Particle burst ─── */
function spawnParticles() {
  const colors = ['#f5c63e','#5ecf88','#0098ea','#fff'];
  for (let i = 0; i < 14; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 4 + Math.random() * 6;
      const x = 20 + Math.random() * (window.innerWidth - 40);
      const y = window.innerHeight * 0.35 + Math.random() * (window.innerHeight * 0.3);
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${x}px; top:${y}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        opacity:0.9;
        transition: transform ${0.6 + Math.random()*0.5}s cubic-bezier(.34,1.56,.64,1),
                    opacity ${0.3 + Math.random()*0.4}s ease ${0.4 + Math.random()*0.3}s;
      `;
      document.body.appendChild(p);
      requestAnimationFrame(() => {
        p.style.transform = `translate(${(Math.random()-0.5)*80}px, ${-(30+Math.random()*60)}px) scale(0.2)`;
        p.style.opacity   = '0';
      });
      setTimeout(() => p.remove(), 1200);
    }, i * 40);
  }
}

/* ─── Ring countdown ─── */
const RING_CIRCUMFERENCE = 2 * Math.PI * 36; // ≈ 226.2

function startCountdown(totalMs) {
  cancelAnimationFrame(_countdownRAF);
  const endTime = Date.now() + totalMs;

  function tick() {
    const remaining = Math.max(0, endTime - Date.now());
    const fraction  = remaining / totalMs;
    const secs      = Math.ceil(remaining / 1000);

    // Ring
    $ringFill.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - fraction);

    // Time display
    if (secs >= 60) {
      const m = Math.floor(secs/60);
      const s = secs % 60;
      $ringTime.textContent = m + ':' + s.toString().padStart(2,'0');
    } else {
      $ringTime.textContent = secs;
    }

    // Progress fill (session-wide: each cycle = 1 segment of 5)
    const sessionPct = Math.min(100, ((_cycleCount % 5) / 5 + (1 - fraction) / 5) * 100);
    $progressFill.style.width = sessionPct + '%';

    if (remaining > 0) {
      _countdownRAF = requestAnimationFrame(tick);
    } else {
      $ringFill.style.strokeDashoffset = 0;
      $ringTime.textContent = '0';
    }
  }
  tick();
}

/* ─── Uptime counter ─── */
function _startUptime() {
  _uptimeHandle = setInterval(() => {
    const s = Math.floor((Date.now() - _startTime) / 1000);
    if (s < 60) {
      $statUptime.textContent = s + 's';
    } else if (s < 3600) {
      $statUptime.textContent = Math.floor(s/60) + 'm ' + (s%60) + 's';
    } else {
      $statUptime.textContent = Math.floor(s/3600) + 'h';
    }
  }, 1000);
}

/* ─── Core: show one ad from Adsgram ─── */
function _showOneAd(blockId) {
  return new Promise((resolve) => {
    if (!window.Adsgram) {
      console.warn('[PASSIVE-AD] Adsgram SDK not loaded');
      resolve(false);
      return;
    }
    try {
      // Fresh init() every time — Adsgram doesn't support instance reuse
      const adc = window.Adsgram.init({ blockId });
      adc.show()
        .then(() => resolve(true))
        .catch((err) => {
          console.warn('[PASSIVE-AD] Ad failed/closed:', err?.message || err);
          resolve(false);
        });
    } catch (e) {
      console.warn('[PASSIVE-AD] Adsgram.init error:', e?.message);
      resolve(false);
    }
  });
}

/* ─── Run one ad cycle ─── */
async function _runCycle() {
  if (!_engineLive) return;

  _cycleCount++;
  $statCycles.textContent = _cycleCount;
  $sessionCount.textContent = 'Cycle ' + _cycleCount;

  setStatus('Showing Ad', '');
  setStateMsg('📺', `<b>Showing ad</b> — Cycle #${_cycleCount}`);
  log(`Cycle #${_cycleCount} — launching ad…`, 'info');

  // Pause countdown during ad
  cancelAnimationFrame(_countdownRAF);
  $ringTime.textContent = '▶';
  $ringFill.style.strokeDashoffset = RING_CIRCUMFERENCE;

  const ok = await _showOneAd(ADSGRAM_BLOCK_ID);

  if (ok) {
    _totalAds++;
    $statTotal.textContent = _totalAds;
    flashEdge();
    spawnParticles();
    setStateMsg('✅', `<b>Ad complete!</b> Cycle #${_cycleCount} — next in <b>70s</b>`);
    log(`Cycle #${_cycleCount} — ad shown successfully ✓`, 'success');
    toast('✅ Ad complete! Next in 70s.');
  } else {
    setStateMsg('⚠️', `<b>Ad skipped or unavailable.</b> Retrying next cycle.`);
    log(`Cycle #${_cycleCount} — ad skipped / not available`, 'warn');
  }

  _scheduleNext();
}

/* ─── Schedule the next cycle ─── */
function _scheduleNext() {
  setStatus('Running', '');

  const nextDelay = CYCLE_INTERVAL_MS;
  _nextAdTime = Date.now() + nextDelay;

  setStateMsg('⏳', `Cycle #${_cycleCount} complete. Next ad in <b>70 seconds</b><span class="dots"></span>`);
  $ringLabel.textContent = 'Next ad in';

  // Start visual countdown
  startCountdown(nextDelay);

  log(`Next cycle in ${nextDelay/1000}s…`, 'info');

  clearTimeout(_timerHandle);
  _timerHandle = setTimeout(_runCycle, nextDelay);
}

/* ─── Engine boot ─── */
async function _bootEngine() {
  _startUptime();
  log('Checking Adsgram SDK…', 'info');
  setStateMsg('🔍', 'Checking Adsgram SDK availability<span class="dots"></span>');

  // Wait for SDK to load (up to 10s)
  let waited = 0;
  while (!window.Adsgram && waited < 10000) {
    await new Promise(r => setTimeout(r, 500));
    waited += 500;
  }

  if (!window.Adsgram) {
    setStatus('SDK Error', 'error');
    setStateMsg('❌', '<b>Adsgram SDK not available.</b> Retrying in 30s…');
    log('Adsgram SDK not found — will retry in 30s', 'error');
    setTimeout(_bootEngine, 30000);
    return;
  }

  log('Adsgram SDK ready ✓', 'success');
  log('Passive ad engine starting…', 'info');

  _engineLive = true;

  // Check Telegram context
  if (!tg || !tg.initData) {
    log('⚠ Not inside Telegram WebApp — ads in simulation mode', 'warn');
    setStateMsg('⚠️', '<b>Running outside Telegram.</b> Ads will not display visually but engine runs.');
  } else {
    log('Telegram WebApp context confirmed ✓', 'success');
  }

  // Initial short wait, then first cycle
  setStateMsg('🚀', 'Engine live! First ad in <b>3 seconds</b><span class="dots"></span>');
  $ringLabel.textContent = 'First ad in';
  startCountdown(INIT_DELAY_MS);

  await new Promise(r => setTimeout(r, INIT_DELAY_MS));

  // Run first cycle immediately
  if (_engineLive) _runCycle();
}

/* ─── Init ─── */
window.addEventListener('DOMContentLoaded', () => {
  setStatus('Initializing', 'paused');
  log('DOM ready. Booting engine…', 'info');
  _bootEngine();
});

// Handle visibility change — pause/resume log but keep timer running
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    log('Tab hidden — timer continues in background', 'warn');
  } else {
    log('Tab visible — engine active', 'info');
  }
});

</script>
</body>
</html>
